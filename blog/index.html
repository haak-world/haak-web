<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog — HAAK</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gloock&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&family=IBM+Plex+Mono:wght@300;400&family=Instrument+Serif:ital@0;1&family=Jura:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #080C0C; --cream: #DFE6E4; --cream2: #7A8C88;
  --gold: #2E9696; --gold-dim: #0C2828; --silver: #8A7898;
  --line: #101C1C; --line2: #1A2E2E;
}
[data-theme="light"] {
  --bg: #E8F0EE; --cream: #101A18; --cream2: #3A5050;
  --gold: #1A6E6E; --gold-dim: #2E9696; --silver: #685878;
  --line: #C8D8D4; --line2: #B0C8C4;
}
html { scroll-behavior: smooth; }
body {
  background-color: var(--bg); color: var(--cream);
  font-family: 'Crimson Pro', Georgia, serif;
  overflow-x: hidden;
  transition: background-color 0.4s, color 0.4s;
  background-image:
    linear-gradient(var(--line) 1px, transparent 1px),
    linear-gradient(90deg, var(--line) 1px, transparent 1px);
  background-size: 28px 28px;
}
.site-nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 32px;
  background: rgba(8,12,12,0.85); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--line2); transition: background 0.4s;
}
[data-theme="light"] .site-nav { background: rgba(232,240,238,0.85); }
.site-nav a { text-decoration: none; border: none; }
.nav-brand { font-family: 'Gloock', serif; font-size: 22px; color: var(--cream); }
.nav-links { display: flex; gap: 28px; align-items: center; }
.nav-links a {
  font-family: 'IBM Plex Mono', monospace; font-size: 11px;
  letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--cream2); transition: color 0.2s;
}
.nav-links a:hover, .nav-links a.active { color: var(--gold); }
#theme-toggle {
  background: none; border: 1px solid var(--line2); border-radius: 14px;
  padding: 4px 10px; cursor: pointer; display: flex; align-items: center; gap: 6px;
}
#theme-toggle svg { width: 12px; height: 12px; fill: var(--gold); }
#theme-toggle span {
  font-family: 'IBM Plex Mono', monospace; font-size: 9px;
  letter-spacing: 0.18em; color: var(--gold); text-transform: uppercase;
}
.blog-header {
  max-width: 680px; margin: 0 auto;
  padding: 120px 32px 0;
}
.blog-title {
  font-family: 'Gloock', serif;
  font-size: clamp(36px, 6vw, 56px);
  font-weight: 400; color: var(--cream); margin-bottom: 8px;
}
.blog-tagline {
  font-family: 'Instrument Serif', serif; font-style: italic;
  font-size: 20px; color: var(--gold); margin-bottom: 40px;
}
.blog-rule { border: none; border-top: 1px solid var(--gold); opacity: 0.4; margin-bottom: 40px; }
.post-list { max-width: 680px; margin: 0 auto; padding: 0 32px 80px; }
.post-link {
  display: block; padding: 24px 0;
  border-bottom: 1px solid var(--line2);
  text-decoration: none; border: none;
  border-bottom: 1px solid var(--line2);
  transition: border-color 0.2s;
}
.post-link:hover { border-bottom-color: var(--gold-dim); }
.idx-date {
  display: block;
  font-family: 'IBM Plex Mono', monospace; font-size: 11px;
  letter-spacing: 0.12em; color: var(--silver);
  text-transform: uppercase; margin-bottom: 6px;
}
.idx-title {
  display: block;
  font-family: 'Gloock', serif; font-size: 24px;
  color: var(--cream); transition: color 0.2s;
}
.post-link:hover .idx-title { color: var(--gold); }
.idx-subtitle {
  font-family: 'Instrument Serif', serif; font-style: italic;
  font-size: 17px; color: var(--cream2); margin-top: 4px;
}
.idx-empty { color: var(--cream2); font-style: italic; padding: 40px 0; }
.site-footer {
  text-align: center; padding: 20px;
  font-family: 'Jura', sans-serif; font-size: 11px;
  color: var(--line2); letter-spacing: 0.08em;
}
@media (max-width: 600px) {
  .blog-header { padding: 100px 20px 0; }
  .post-list { padding: 0 20px 60px; }
  .site-nav { padding: 12px 20px; }
}
</style>
</head>
<body>
<nav class="site-nav">
  <a href="../" class="nav-brand">HAAK</a>
  <div class="nav-links">
    <a href="../">home</a>
    <a href="./" class="active">blog</a>
    <button id="theme-toggle" aria-label="Toggle theme">
      <svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <span id="toggle-label">day</span>
    </button>
  </div>
</nav>
<div class="blog-header">
  <h1 class="blog-title">Blog</h1>
  <p class="blog-tagline">Notes from the Invisible College</p>
  <hr class="blog-rule">
</div>
<div class="post-list">
<a href="posts/2026-03-12-why-haak.html" class="post-link"><span class="idx-date">2026-03-12</span><span class="idx-title">Why HAAK</span><p class="idx-subtitle">The system is its own experiment</p></a>
</div>
<div class="site-footer">haak &middot; 2026</div>
<script>
const moonPath="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z";
const sunPath="M12 2a1 1 0 0 1 1 1v1a1 1 0 0 1-2 0V3a1 1 0 0 1 1-1zm0 15a1 1 0 0 1 1 1v1a1 1 0 0 1-2 0v-1a1 1 0 0 1 1-1zm10-5a1 1 0 0 1-1 1h-1a1 1 0 0 1 0-2h1a1 1 0 0 1 1 1zM4 12a1 1 0 0 1-1 1H2a1 1 0 0 1 0-2h1a1 1 0 0 1 1 1zm15.07-7.07a1 1 0 0 1 0 1.41l-.71.71a1 1 0 1 1-1.41-1.41l.71-.71a1 1 0 0 1 1.41 0zM6.34 17.66a1 1 0 0 1 0 1.41l-.71.71a1 1 0 1 1-1.41-1.41l.71-.71a1 1 0 0 1 1.41 0zm12.73 0a1 1 0 0 1-1.41 0l-.71-.71a1 1 0 1 1 1.41-1.41l.71.71a1 1 0 0 1 0 1.41zM5.64 4.93a1 1 0 0 1 1.41 0l.71.71A1 1 0 1 1 6.35 7.05l-.71-.71a1 1 0 0 1 0-1.41zM12 7a5 5 0 1 0 0 10A5 5 0 0 0 12 7z";
const btn=document.getElementById('theme-toggle'),icon=btn.querySelector('path'),lbl=document.getElementById('toggle-label'),html=document.documentElement;
function applyTheme(l){if(l){html.setAttribute('data-theme','light');icon.setAttribute('d',sunPath);lbl.textContent='night';}else{html.removeAttribute('data-theme');icon.setAttribute('d',moonPath);lbl.textContent='day';}localStorage.setItem('haak-theme',l?'light':'dark');}
if(localStorage.getItem('haak-theme')==='light')applyTheme(true);
btn.addEventListener('click',()=>applyTheme(html.getAttribute('data-theme')!=='light'));
</script>
</body>
</html>
